    const UPLOAD_WORKER_URL   = "https://marketplace-upload.santinomazza09.workers.dev";

    // Inicializar cliente Supabase como variable global "db"
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Función global de subida de imágenes
    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            let { width, height } = img;
            const maxDim = 1200;
            if (width > maxDim || height > maxDim) {
              if (width > height) { height = (height * maxDim) / width; width = maxDim; }
              else { width = (width * maxDim) / height; height = maxDim; }
            }
            canvas.width = width;
            canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            let quality = 0.85;
            const tryCompress = () => {
              canvas.toBlob((blob) => {
                if (blob.size / 1024 > 150 && quality > 0.3) { quality -= 0.1; tryCompress(); }
                else resolve(new File([blob], file.name, { type: "image/jpeg" }));
              }, "image/jpeg", quality);
            };
            tryCompress();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function uploadImage(file) {
      const compressed = await compressImage(file);
      const formData = new FormData();
      formData.append("file", compressed, file.name);
      
      const res = await fetch(UPLOAD_WORKER_URL, { 
        method: "POST", 
        body: formData 
      });
      
      if (!res.ok) throw new Error("Error al subir imagen");
      return res.json(); // { url, key }
    }
